name: Fide Evaluations

on:
  workflow_dispatch:
    inputs:
      commit_results:
        description: "Commit generated statement batches"
        required: false
        default: "true"
      method_identifier:
        description: "Evaluation method identifier"
        required: false
        default: "https://fide.work/methods/identity/sameas-trust/v1"
      input_identifier:
        description: "Input snapshot identifier"
        required: false
        default: "https://fide.work/inputs/identity/sameas/current"

permissions:
  contents: read

jobs:
  run-sameas-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sameAs evaluation
        env:
          FIDE_SAMEAS_METHOD_IDENTIFIER: ${{ inputs.method_identifier }}
          FIDE_EVALUATION_INPUT_IDENTIFIER: ${{ inputs.input_identifier }}
        run: pnpm --filter fide-statements-template evaluate:sameas

      - name: Commit generated statement batches
        if: ${{ inputs.commit_results == 'true' }}
        env:
          GH_PUSH_TOKEN: ${{ secrets.FIDE_GH_PUSH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_PUSH_TOKEN}" ]; then
            echo "Missing required secret: FIDE_GH_PUSH_TOKEN"
            exit 1
          fi

          git config user.name "fide-evaluations-bot"
          git config user.email "fide-evaluations-bot@users.noreply.github.com"

          if git diff --quiet -- ".fide/statements"; then
            echo "No statement batch changes to commit."
            exit 0
          fi

          git add .fide/statements
          git commit -m "chore(evaluation): publish sameAs trust run ${GITHUB_RUN_ID}"
          git push "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

